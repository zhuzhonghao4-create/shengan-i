<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>SHEIN 产品图片库</title>
  <style>
    body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .gallery img { width: 100%; height: auto; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>SHEIN 产品图片库</h1>
  <div class="gallery">
    <!-- 这里会展示你仓库里 /图片/ 文件夹下的所有图片 -->
    <img src="图片/101.jpg" alt="101">
    <img src="图片/1010.jpg" alt="1010">
    <img src="图片/1011.jpg" alt="1011">
    <!-- 你可以继续添加更多图片路径 -->
  </div>
</body>
</html>
